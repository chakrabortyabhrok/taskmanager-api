<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .task-card {
            transition: all 0.2s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
        }
        .description {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-900">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Task Manager</h1>
                <p class="text-slate-400 text-sm">My Deployed Django + DRF API</p>
            </div>
            <button onclick="showCreateModal()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg flex items-center gap-2 transition-colors">
                <i class="fas fa-plus"></i>
                <span>New Task</span>
            </button>
        </div>

        <!-- Filters -->
        <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl mb-6 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Status</label>
                <select id="statusFilter" onchange="filterTasks()" 
                        class="bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 w-40 focus:outline-none focus:border-blue-500">
                    <option value="">All Status</option>
                    <option value="todo">Todo</option>
                    <option value="in_progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Category</label>
                <input type="text" id="categoryFilter" placeholder="Category name" 
                       onkeyup="filterTasks()" 
                       class="bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 w-48 focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="loadTasks()" 
                    class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                <i class="fas fa-sync-alt"></i>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Tasks List -->
        <div id="tasksContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Tasks loaded via JavaScript -->
        </div>
    </div>

    <!-- Create Task Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md text-white">
            <h2 class="text-xl font-semibold mb-4">Create New Task</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Title</label>
                    <input type="text" id="title" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Description</label>
                    <textarea id="description" rows="3" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Status</label>
                        <select id="status" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                            <option value="todo">Todo</option>
                            <option value="in_progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Category</label>
                        <input type="text" id="category" placeholder="e.g. Work" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button onclick="hideCreateModal()" class="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">Cancel</button>
                <button onclick="createTask()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition-colors">Create Task</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + "/api";
        let currentPage = 1;

        // Load tasks
        async function loadTasks(page = 1) {
            currentPage = page;
            const container = document.getElementById('tasksContainer');
            container.innerHTML = `<div class="col-span-3 text-center py-8 text-slate-400">Loading tasks...</div>`;

            try {
                const res = await fetch(`${API_BASE}/tasks/?page=${page}`);
                const data = await res.json();
                const tasks = data.results || data;
                renderTasks(tasks);
                renderPagination(data);
            } catch (error) {
                container.innerHTML = `<div class="col-span-3 text-red-400 text-center">Failed to load tasks</div>`;
            }
        }

        // Render tasks (Compact + Dark)
        function renderTasks(tasks) {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '';

            if (!tasks || tasks.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-8 text-slate-400">No tasks found</div>`;
                return;
            }

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-sm`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-semibold text-white text-base pr-2">${task.title}</h3>
                        <span class="px-2.5 py-0.5 text-xs font-medium rounded-full whitespace-nowrap ${getStatusBadge(task.status)}">
                            ${task.status.replace('_', ' ')}
                        </span>
                    </div>
                    
                    <p class="description text-sm text-slate-400 mb-3">
                        ${task.description || 'No description'}
                    </p>
                    
                    <div class="flex items-center justify-between text-xs">
                        <div>
                            <span class="text-slate-500">Category:</span> 
                            <span class="font-medium text-slate-300">${task.category || 'None'}</span>
                        </div>
                        <button onclick="deleteTask(${task.id}, this)" 
                                class="text-red-400 hover:text-red-500 p-1 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getStatusBadge(status) {
            if (status === 'done') return 'bg-green-900 text-green-400';
            if (status === 'in_progress') return 'bg-yellow-900 text-yellow-400';
            return 'bg-blue-900 text-blue-400';
        }

        // Pagination
        function renderPagination(data) {
            const container = document.getElementById('tasksContainer');
            const paginationDiv = document.createElement('div');
            paginationDiv.className = 'col-span-3 flex justify-center items-center gap-4 mt-6';
            
            let html = '';
            if (data.previous) {
                html += `<button onclick="loadTasks(${currentPage - 1})" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">← Previous</button>`;
            }
            html += `<span class="px-4 text-sm text-slate-400">Page ${currentPage}</span>`;
            if (data.next) {
                html += `<button onclick="loadTasks(${currentPage + 1})" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Next →</button>`;
            }
            paginationDiv.innerHTML = html;
            container.appendChild(paginationDiv);
        }

        // Filter tasks (server-side)
        function filterTasks() {
            const status = document.getElementById('statusFilter').value;
            const category = document.getElementById('categoryFilter').value.trim();

            let queryParams = [];
            if (status) queryParams.push(`status=${status}`);
            if (category) queryParams.push(`category=${encodeURIComponent(category)}`);
            queryParams.push('page=1');

            const queryString = `?${queryParams.join('&')}`;

            fetch(`${API_BASE}/tasks/${queryString}`)
                .then(res => res.json())
                .then(data => {
                    const tasks = data.results || data;
                    renderTasks(tasks);
                    renderPagination(data);
                })
                .catch(() => {
                    document.getElementById('tasksContainer').innerHTML = 
                        `<div class="col-span-3 text-red-400 text-center">Failed to load tasks</div>`;
                });
        }

        // Delete Task
        async function deleteTask(taskId, buttonElement) {
            if (!confirm("Are you sure you want to delete this task?")) return;

            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}/`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    buttonElement.closest('.task-card').remove();
                } else {
                    alert("Failed to delete task");
                }
            } catch (error) {
                alert("Error deleting task");
            }
        }

        // Modal functions
        function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('createModal').classList.add('flex');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('flex');
            document.getElementById('createModal').classList.add('hidden');
        }

        // Create Task
        async function createTask() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const status = document.getElementById('status').value;
            const category = document.getElementById('category').value;

            if (!title) {
                alert("Title is required");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/tasks/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        status: status,
                        category: category || null
                    })
                });

                if (res.ok) {
                    hideCreateModal();
                    loadTasks(1);
                    document.getElementById('title').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('category').value = '';
                } else {
                    alert("Failed to create task");
                }
            } catch (error) {
                alert("Error creating task");
            }
        }

        // Load tasks on page load
        window.onload = function() {
            loadTasks(1);
        }
    </script>
</body>
</html>
